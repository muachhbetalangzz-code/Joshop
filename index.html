<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOSJIS SHOP - Top Up Aman</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #05070a;
            color: #ffffff;
        }

        .glass {
            background: rgba(15, 18, 30, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-custom {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.4) 0%, rgba(15, 23, 42, 0.8) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-custom:hover {
            border-color: #facc15;
            transform: translateY(-5px);
        }

        .selectable-item {
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.02);
        }

        .selectable-item.selected {
            border-color: #facc15;
            background: rgba(250, 204, 21, 0.1);
        }

        .btn-primary {
            background: #facc15;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Poster Warna Tanpa Gambar */
        .poster-fallback {
            background: linear-gradient(45deg, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: 900;
            color: rgba(255,255,255,0.1);
            text-transform: uppercase;
            font-style: italic;
        }

        .badge-free {
            background: #22c55e;
            color: white;
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 900;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 glass border-b border-white/5">
        <div class="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="cursor-pointer" onclick="goToHome()">
                <span class="text-xl font-extrabold uppercase italic tracking-tighter">JOSJIS<span class="text-yellow-400">SHOP</span></span>
            </div>
            <div class="flex items-center gap-4">
                <div id="role-badge" class="px-3 py-1.5 rounded-full bg-blue-500/10 border border-blue-500/20 text-[9px] font-black uppercase text-blue-400">
                    User Mode
                </div>
                <button onclick="toggleAdminPanel()" class="px-4 py-2 rounded-xl glass text-[10px] font-black uppercase text-slate-400 hover:text-white">
                    Admin
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-10">

        <!-- HOME VIEW -->
        <div id="view-home" class="view-section active">
            <div id="poster-box" class="mb-12 relative h-64 md:h-72 rounded-[3rem] overflow-hidden shadow-2xl poster-fallback border border-white/5">
                <span id="poster-text">JOSJIS STORE</span>
                <div class="absolute bottom-10 left-10 text-left">
                    <p id="hero-title" class="text-3xl font-black text-white italic uppercase mb-2">Pusat Top Up</p>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Otomatis • Murah • Aman</p>
                </div>
            </div>

            <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 mb-8 flex items-center gap-4">
                Pilih Produk <span class="h-[1px] flex-1 bg-white/5"></span>
            </h2>
            
            <div id="game-grid" class="grid grid-cols-2 md:grid-cols-3 gap-6"></div>
        </div>

        <!-- DETAIL VIEW -->
        <div id="view-detail" class="view-section">
            <button onclick="goToHome()" class="text-slate-500 hover:text-white font-bold text-[10px] uppercase mb-8">
                ← Kembali
            </button>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="glass rounded-[2.5rem] p-10 text-center border-t-4 border-yellow-400">
                        <div id="detail-icon-box" class="w-32 h-32 mx-auto rounded-[2rem] flex items-center justify-center text-4xl font-black mb-6 shadow-2xl"></div>
                        <h2 id="detail-title" class="text-2xl font-black italic uppercase text-white mb-2"></h2>
                        <div id="admin-notice" class="hidden">
                            <span class="badge-free">ADMIN: FREE ACCESS</span>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="glass rounded-[2rem] p-8">
                        <h3 class="font-black mb-6 uppercase text-[10px] text-slate-400">Input Data</h3>
                        <div id="input-fields-container" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                    </div>

                    <div class="glass rounded-[2rem] p-8">
                        <h3 class="font-black mb-6 uppercase text-[10px] text-slate-400">Pilih Paket</h3>
                        <div id="nominal-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                    </div>

                    <div class="glass rounded-[2.5rem] p-8 flex flex-col sm:flex-row justify-between items-center gap-6">
                        <div>
                            <p class="text-slate-500 text-[10px] font-black uppercase">Total Harga</p>
                            <p id="total-price" class="text-4xl font-black text-white italic">Rp 0</p>
                        </div>
                        <button onclick="openInvoice()" class="w-full sm:w-auto btn-primary px-12 py-5 rounded-2xl text-sm shadow-xl hover:scale-105 transition">
                            Checkout
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ADMIN MODAL -->
    <div id="modal-admin-login" class="hidden fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm rounded-[3rem] p-10 text-center">
            <h3 class="font-black text-xl italic uppercase mb-6">Login <span class="text-yellow-400">Admin</span></h3>
            <input type="password" id="admin-input-user" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-white text-center font-bold mb-6 outline-none focus:border-yellow-400">
            <div class="flex gap-3">
                <button onclick="closeAdminLogin()" class="flex-1 bg-white/5 py-4 rounded-2xl text-[10px] font-black uppercase">Batal</button>
                <button onclick="attemptAdminLogin()" class="flex-[2] btn-primary py-4 rounded-2xl text-[10px] font-black uppercase">Masuk</button>
            </div>
        </div>
    </div>

    <!-- INVOICE MODAL -->
    <div id="modal-invoice" class="hidden fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6">
        <div class="bg-white text-black w-full max-w-md rounded-[3rem] p-10 text-center">
            <h3 class="font-black text-2xl uppercase italic mb-8">Pembayaran</h3>
            <div class="bg-slate-100 p-6 rounded-2xl mb-6 text-left border border-slate-200">
                <p class="text-[9px] font-black text-slate-400 uppercase">DANA Transfer</p>
                <p id="pay-num" class="text-lg font-black tracking-widest text-slate-800">0882005257905</p>
            </div>
            <div class="bg-slate-900 text-white p-8 rounded-[2rem] mb-8">
                <p class="text-[10px] font-black uppercase opacity-50">Tagihan</p>
                <p id="invoice-total" class="text-4xl font-black text-yellow-400"></p>
            </div>
            <button onclick="finishOrder()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black uppercase text-xs mb-4">Lanjut WhatsApp</button>
            <button onclick="closeInvoice()" class="text-slate-400 text-[10px] font-black uppercase">Batal</button>
        </div>
    </div>

    <script>
        const ADMIN_PASS = "langzz!!";
        const WA = "62882005257905";

        const games = [
            { 
                id: 'ff', name: 'Free Fire', color: 'from-orange-500 to-red-600', short: 'FF',
                fields: ['ID Player'], 
                nominals: [{n:'70 Diamonds', p:10000}, {n:'355 Diamonds', p:50000}, {n:'Member Mingguan', p:30000}]
            },
            { 
                id: 'ml', name: 'Mobile Legends', color: 'from-blue-600 to-indigo-700', short: 'ML',
                fields: ['User ID', 'Zone ID'], 
                nominals: [
                    {n:'86 Diamonds', p:22000}, {n:'257 Diamonds', p:65000}, 
                    {n:'Weekly Pass (1x)', p:28500}, {n:'Weekly Pass (2x)', p:57000},
                    {n:'Weekly Pass (3x)', p:85000}, {n:'Weekly Pass (4x)', p:112000}
                ]
            },
            { 
                id: 'bs', name: 'Blood Strike', color: 'from-red-700 to-black', short: 'BS',
                fields: ['ID Player'], 
                nominals: [{n:'100 Gold', p:16000}, {n:'500 Gold', p:78000}, {n:'Strike Pass', p:120000}]
            }
        ];

        let state = { isAdmin: localStorage.getItem('josjis_adm') === 'true', selectedGame: null, selectedNominal: null };

        function init() {
            renderGrid();
            updateUI();
            setInterval(rotatePoster, 4000);
        }

        function renderGrid() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = games.map(g => `
                <div class="card-custom p-6 rounded-[2.5rem] text-center cursor-pointer" onclick="selectGame('${g.id}')">
                    <div class="w-full aspect-square rounded-[2rem] bg-gradient-to-br ${g.color} flex items-center justify-center text-4xl font-black mb-4 shadow-xl">
                        ${g.short}
                    </div>
                    <p class="font-black text-[11px] uppercase italic text-white tracking-widest">${g.name}</p>
                </div>
            `).join('');
        }

        function rotatePoster() {
            const g = games[Math.floor(Math.random()*games.length)];
            document.getElementById('poster-text').innerText = g.name;
            document.getElementById('hero-title').innerText = g.name + " READY";
        }

        function selectGame(id) {
            state.selectedGame = games.find(g => g.id === id);
            state.selectedNominal = null;
            document.getElementById('detail-title').innerText = state.selectedGame.name;
            const iconBox = document.getElementById('detail-icon-box');
            iconBox.className = `w-32 h-32 mx-auto rounded-[2rem] flex items-center justify-center text-4xl font-black mb-6 shadow-2xl bg-gradient-to-br ${state.selectedGame.color}`;
            iconBox.innerText = state.selectedGame.short;
            document.getElementById('total-price').innerText = "Rp 0";
            document.getElementById('input-fields-container').innerHTML = state.selectedGame.fields.map(f => `
                <div class="space-y-2">
                    <label class="text-[9px] font-black text-slate-500 uppercase ml-1">${f}</label>
                    <input type="text" data-field="${f}" placeholder="..." class="w-full bg-white/5 border border-white/10 p-5 rounded-2xl text-white font-bold outline-none focus:border-yellow-400">
                </div>
            `).join('');
            renderNominals();
            showView('detail');
        }

        function renderNominals() {
            const grid = document.getElementById('nominal-grid');
            grid.innerHTML = state.selectedGame.nominals.map((n, i) => `
                <div class="selectable-item p-5 rounded-2xl" onclick="selectNominal(${i}, this)">
                    <p class="font-black text-[10px] uppercase text-white mb-1">${n.n}</p>
                    <p class="text-yellow-400 font-black text-[11px] italic">${state.isAdmin ? 'FREE' : 'Rp '+n.p.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function selectNominal(idx, el) {
            state.selectedNominal = state.selectedGame.nominals[idx];
            document.querySelectorAll('.selectable-item').forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('total-price').innerText = "Rp " + (state.isAdmin ? 0 : state.selectedNominal.p).toLocaleString();
        }

        function attemptAdminLogin() {
            if (document.getElementById('admin-input-user').value === ADMIN_PASS) {
                state.isAdmin = true;
                localStorage.setItem('josjis_adm', 'true');
                location.reload();
            } else { alert("Password Salah!"); }
        }

        function toggleAdminPanel() {
            if (state.isAdmin) { state.isAdmin = false; localStorage.setItem('josjis_adm', 'false'); location.reload(); }
            else { document.getElementById('modal-admin-login').classList.remove('hidden'); }
        }

        function updateUI() {
            if (state.isAdmin) {
                document.getElementById('role-badge').innerText = "ADMIN MODE";
                document.getElementById('role-badge').className = "px-3 py-1.5 rounded-full bg-yellow-400/10 border border-yellow-400/20 text-[9px] font-black uppercase text-yellow-400";
                document.getElementById('admin-notice').classList.remove('hidden');
            }
        }

        function openInvoice() {
            if (!state.selectedNominal) return alert("Pilih produk!");
            document.getElementById('invoice-total').innerText = "Rp " + (state.isAdmin ? 0 : state.selectedNominal.p).toLocaleString();
            document.getElementById('modal-invoice').classList.remove('hidden');
        }

        function finishOrder() {
            const data = Array.from(document.querySelectorAll('#input-fields-container input')).map(i => `${i.dataset.field}: ${i.value}`).join(" | ");
            const msg = `*ORDER JOSJIS SHOP*\nGame: ${state.selectedGame.name}\nData: ${data}\nProduk: ${state.selectedNominal.n}\nTotal: Rp ${(state.isAdmin ? 0 : state.selectedNominal.p).toLocaleString()}`;
            window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`);
        }

        function closeAdminLogin() { document.getElementById('modal-admin-login').classList.add('hidden'); }
        function closeInvoice() { document.getElementById('modal-invoice').classList.add('hidden'); }
        function goToHome() { showView('home'); }
        function showView(v) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + v).classList.add('active');
            window.scrollTo(0,0);
        }

        window.onload = init;
    </script>
</body>
</html>
